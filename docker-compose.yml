services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - packages/server/.env
    volumes:
      - "./packages/server/data:/app/packages/server/data"
      - "./source data:/app/source data"
      - "./output:/app/output"
    environment:
      REPO_ROOT: "/app"
      PYTHON_BIN: "python3"
